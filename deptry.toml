[tool.deptry]
known_first_party = [
  "app_v2",
  "config",
  "scraper",
  "scripts",
  "scrape_log",
  "scraper_config",
]

[tool.deptry.per_rule_ignores]
# Optional dependency: normalize_course_names.py imports spellchecker
# (pyspellchecker) inside a try/except and falls back gracefully, so it is not
# a required runtime/CI dependency. Ignore both "missing" (CI, not installed)
# and "transitive" (local, installed but undeclared).
DEP001 = [
  "spellchecker",
]
DEP003 = [
  "spellchecker",
]
DEP002 = [
  "black",
  "deptry",
  "gunicorn",
  "httpx",
  "psutil",
  "pytest",
  "pytest-cov",
  "pytest-xdist",
  "python-dotenv",
  "python-Levenshtein",
  "python-multipart",
  "requests",
  "ruff",
  "uvicorn",
  "vulture",
]
