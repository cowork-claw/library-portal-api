name: Jules Bug Fixer

# Trigger when an issue is labeled with 'bug'
on:
  issues:
    types: [labeled]

jobs:
  fix-bug:
    name: Auto-Fix Bug
    # Only run when the 'bug' label is added
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    
    steps:
      - name: Log bug details
        run: |
          echo "## 🐛 Bug Report Received" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Issue**: #${{ github.event.issue.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Title**: ${{ github.event.issue.title }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author**: ${{ github.event.issue.user.login }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Jules will analyze and attempt to fix this bug." >> $GITHUB_STEP_SUMMARY

      - name: Invoke Jules
        # SECURITY: Only allow trusted users to trigger Jules
        # To add more trusted users, update the allowlist below
        # Example: '["re1t", "trusted-user", "another-collaborator"]'
        if: ${{ contains(fromJSON('["re1t"]'), github.event.issue.user.login) }}
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          prompt: |
            Diagnose and fix the following bug:

            ## Bug Report

            **Title**: ${{ github.event.issue.title }}
            **Issue**: #${{ github.event.issue.number }}
            **Reporter**: ${{ github.event.issue.user.login }}

            **Description**:
            ${{ github.event.issue.body }}

            ## Codebase Structure

            ```
            library-portal-api/
            ├── app_v2/                     # FastAPI application (Python 3.11+)
            │   ├── main.py                # Entry point, lifespan, CORS middleware
            │   ├── models.py              # Pydantic models (Paper, responses)
            │   ├── data_loader.py         # JSON data loading
            │   ├── routes/
            │   │   ├── papers.py          # GET /api/papers endpoints
            │   │   ├── metadata.py        # GET /api/metadata, /api/statistics
            │   │   └── health.py          # Health check endpoints
            │   ├── services/
            │   │   ├── indexing.py        # PaperIndex - pre-built Dict indexes
            │   │   └── search.py          # Fuzzy search with TheFuzz
            │   └── middleware/auth.py     # APIKeyMiddleware
            ├── scraper/
            │   ├── library_scraper/spiders/  # Scrapy spider
            │   └── ../config/config_v2.py # TARGET_YEAR_THRESHOLD=2024
            ├── scripts/processing/
            │   ├── paper_categorizer.py   # Categorization logic
            │   └── validate_data.py       # Data validation
            └── data/classified/organized/ # JSON paper data
            ```

            ## Debugging Process

            1. **Analyze** - Review the bug report
               - Identify error messages and stack traces
               - Understand expected vs actual behavior

            2. **Locate** - Trace through the codebase
               - Start from the entry point (API endpoint or scraper)
               - Follow the code flow to find the bug

            3. **Fix** - Implement a minimal, targeted fix
               - Make the smallest change that fixes the issue
               - Follow existing code patterns and style

            4. **Verify** - Test the fix
               - Validate data: `python scripts/processing/validate_data.py`
               - Test API starts: `timeout 5 uvicorn app_v2.main:app || true`

            5. **Format** - Run `black .` before PR

            ## Constraints

            - Make minimal changes - only fix the reported bug
            - Follow existing code patterns
            - Reference issue #${{ github.event.issue.number }} in PR
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: 'main'
