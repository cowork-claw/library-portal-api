name: Jules CI Failure Fixer

# Manual trigger only - prevents automatic deployments on every PR
# Previously used workflow_run which created deployments for every scraper run
on:
  workflow_dispatch:
    inputs:
      failed_run_url:
        description: 'URL of the failed workflow run'
        required: true
        type: string
      branch:
        description: 'Branch to fix'
        required: true
        default: 'main'
        type: string

jobs:
  fix-failure:
    name: Auto-Fix Scraper Failures
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    
    steps:
      - name: Log failure details
        env:
          FAILED_RUN_URL: ${{ inputs.failed_run_url }}
          BRANCH: ${{ inputs.branch }}
        run: |
          echo "## 🔴 Scraper Failure - Manual Fix Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: $BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed Run URL**: $FAILED_RUN_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Jules will analyze the failure and attempt to fix it." >> $GITHUB_STEP_SUMMARY

      - name: Invoke Jules to fix failure
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          prompt: |
            The CI workflow has failed. Fix it.

            **Failed Run:** ${{ inputs.failed_run_url }}
            **Branch:** ${{ inputs.branch }}

            ## Codebase Structure

            ```
            library-portal-api/
            ├── scraper/
            │   ├── library_scraper/
            │   │   ├── spiders/question_papers_enhanced.py  # Main spider
            │   │   ├── middlewares.py                       # Scrapy middlewares
            │   │   └── settings.py                          # Scrapy settings
            │   └── scraper_config.py  # TARGET_YEAR_THRESHOLD=2024, BLACKLISTED_YEARS
            ├── scripts/processing/
            │   ├── paper_categorizer.py  # Categorization with confidence scoring
            │   ├── run_categorizer.py    # CLI for categorizer
            │   └── validate_data.py      # Data validation
            └── .github/workflows/scraper-v2.yml  # Workflow definition
            ```

            ## Common Failure Patterns

            1. **Scrapy Spider Errors**
               - KeyError: Missing expected fields in scraped data
               - TypeError: Async/sync generator issues in middlewares
               - ImportError: Missing dependencies
               - File: `scraper/library_scraper/spiders/question_papers_enhanced.py`

            2. **Configuration Mismatches**
               - TARGET_YEAR_THRESHOLD inconsistencies
               - BLACKLISTED_YEARS not matching actual data
               - File: `scraper/scraper_config.py`

            3. **Categorization Errors**
               - Paper validation failures (missing required fields)
               - JSON serialization issues
               - File: `scripts/processing/paper_categorizer.py`

            4. **Middleware Compatibility (Scrapy 2.12+)**
               - Must use synchronous methods: `def` with `for` loops
               - NOT `async def` with `async for`
               - File: `scraper/library_scraper/middlewares.py`

            ## Fix Process

            1. Analyze the failure from the workflow run logs
            2. Identify the specific error message and stack trace
            3. Locate the relevant file(s)
            4. Implement a minimal, targeted fix
            5. Verify: `cd scraper && scrapy crawl question_papers_enhanced --nolog | head -20`
            6. Validate: `python scripts/processing/validate_data.py`
            7. Format: `black .`

            ## Rules

            - Keep fixes minimal and targeted
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ inputs.branch }}
          include_last_commit: true
