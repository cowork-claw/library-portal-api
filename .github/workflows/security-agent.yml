name: Jules Daily Security Scan

on:
  schedule:
    - cron: '0 6 * * 2'  # Every Tuesday at 6 AM UTC
  workflow_dispatch:

jobs:
  scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Invoke Jules Security Agent
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          prompt: |
            You are a security agent. Scan for vulnerabilities and fix them.

            ## Codebase Architecture

            ```
            library-portal-api/
            ├── app_v2/
            │   ├── main.py             # FastAPI app, CORS middleware
            │   ├── middleware/auth.py  # APIKeyMiddleware - validates X-API-Key header
            │   ├── routes/             # API endpoints
            │   └── models.py           # Pydantic request/response validation
            ├── config/config_v2.py     # Pydantic settings (LIBRARY_PORTAL_ env prefix)
            ├── scraper/                # Scrapy spider with file I/O
            └── scripts/processing/     # Data processing with JSON file operations
            ```

            ## CRITICAL (fix immediately):

            1. **Secrets & Credentials**
               - Hardcoded API keys or passwords in source code
               - Secrets in config files (check .env*, config/)
               - API keys exposed in logs

            2. **Injection Attacks**
               - Command injection in subprocess calls (scraper/, scripts/)
               - Path traversal in file operations
               - JSON injection in data handling

            3. **Authentication Bypass**
               - Review app_v2/middleware/auth.py for bypass vectors
               - Missing auth on sensitive endpoints
               - Check public endpoints: /, /docs, /health, /health/data

            ## HIGH PRIORITY:

            1. **Input Validation**
               - Query parameter validation in app_v2/routes/*.py
               - Unvalidated file paths or URLs
               - Missing Pydantic validation

            2. **Information Disclosure**
               - Sensitive data in error messages
               - Debug info in production responses
               - Excessive logging of user data

            3. **CORS & Headers**
               - Review CORSMiddleware config in app_v2/main.py
               - Check allow_origins setting
               - Missing security headers

            4. **Dependencies**
               - Check requirements.txt for known vulnerabilities

            ## Files to Audit

            - `app_v2/middleware/auth.py` - Authentication logic
            - `app_v2/main.py` - CORS and middleware config
            - `app_v2/routes/*.py` - API endpoints
            - `config/config_v2.py` - Configuration handling
            - `scraper/library_scraper/spiders/` - Web scraping code

            ## Rules

            - Fix highest severity issues first
            - Keep changes under 100 lines
            - Run `black .` before PR
            - Only create PR if vulnerabilities found
            - Include clear explanation of each fix
          jules_api_key: ${{ secrets.JULES_API_KEY }}
