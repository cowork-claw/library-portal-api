name: Jules Monthly Security Scan

on:
  schedule:
    # Monthly (1st @ 06:00 UTC). Reduced from weekly to stop parked sessions piling
    # up; most weekly runs found nothing ("No diff") yet still created a session.
    - cron: '0 6 1 * *'
  workflow_dispatch:

concurrency:
  group: jules-security
  cancel-in-progress: false

jobs:
  pre-check:
    name: Check for existing security PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check for open security PRs
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_prs=$(gh pr list --repo ${{ github.repository }} \
            --state open --author '@me' --json title \
            --jq '[.[] | select(.title | test("(?i)security|vulnerabilit|harden"))] | length')
          if [ "$open_prs" -gt "0" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Skipping — $open_prs open security PR(s) already exist"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  scan:
    name: Security Vulnerability Scan
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Invoke Jules Security Agent
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          prompt: |
            You are a security agent. Scan for CODE-LEVEL vulnerabilities and fix them.

            ## IMPORTANT — Scope

            - Focus on **code-level** security issues only (injection, auth bypass,
              info disclosure, insecure logic).
            - Do NOT bump dependency versions — Dependabot handles that automatically.
            - Do NOT re-audit areas already documented in the "Codebase Evolution"
              section of `.github/copilot-instructions.md`.

            ## Codebase Architecture

            ```
            library-portal-api/
            ├── app_v2/
            │   ├── main.py             # FastAPI app, CORS middleware
            │   ├── middleware/auth.py  # APIKeyMiddleware - validates X-API-Key header
            │   ├── middleware/security.py # SecurityHeadersMiddleware - CSP, HSTS, etc.
            │   ├── routes/             # API endpoints
            │   └── models.py           # Pydantic request/response validation
            ├── config/config_v2.py     # Pydantic settings (LIBRARY_PORTAL_ env prefix)
            ├── scraper/                # Scrapy spider with file I/O
            └── scripts/processing/     # Data processing with JSON file operations
            ```

            ## What to Look For

            1. **CRITICAL** — Hardcoded secrets, command injection, auth bypass
            2. **HIGH** — Path traversal, unvalidated input leading to crashes,
               info disclosure in error responses
            3. **MEDIUM** — CORS misconfiguration, missing security headers,
               excessive logging of sensitive data

            ## Already Secured (do NOT re-audit)

            - Security headers (CSP, HSTS, X-Frame-Options, etc.) via SecurityHeadersMiddleware
            - Search query length limits (max 100 chars)
            - Year/semester parameter validation with ranges
            - String parameter max_length constraints
            - DataLoader error sanitization (class name only, no file paths)
            - course_code max_length=20 validation

            ## Commands

            - Run tests: `pytest -q`
            - Format: `black .`

            ## Rules

            - Only fix code-level security issues, NOT dependency versions
            - Keep changes under 100 lines
            - Run tests before creating PR
            - DO NOT modify .github/copilot-instructions.md or README.md
              unless you changed security behavior or public interfaces
            - If no vulnerabilities found, do NOT create a PR
          jules_api_key: ${{ secrets.JULES_API_KEY }}
