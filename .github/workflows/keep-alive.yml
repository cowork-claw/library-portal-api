name: Keep Alive - Ping Health Endpoint

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Ping Health Endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://lib-portal.onrender.com/health --max-time 60 || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed (HTTP $response)"
          elif [ "$response" = "000" ]; then
            echo "⚠️ Health check failed (network error or timeout)"
          else
            echo "⚠️ Health check returned HTTP $response"
          fi

      - name: Log timestamp
        run: echo "Pinged at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
