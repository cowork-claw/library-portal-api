name: Keep Render API Alive

on:
  schedule:
    # Ping every 14 minutes to prevent Render free tier from sleeping
    - cron: '*/14 * * * *'
  
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    name: Ping Render API
    runs-on: ubuntu-latest
    permissions:
      contents: none
    
    steps:
      - name: 🏓 Ping health endpoint
        run: |
          echo "Pinging Render API to keep it alive..."
          
          # Temporarily disable exit on error to capture curl failure
          set +e

          # Use a real User-Agent to avoid bot blocking
          # stderr will go to logs automatically
          # Use --fail to make curl return non-zero on 4xx/5xx? No, we want to log the code.
          response=$(curl -s -S -w "\n%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36" \
            --connect-timeout 10 \
            --max-time 60 \
            https://library-portal-api.onrender.com/health)

          exit_code=$?
          set -e

          # Extract HTTP code (last line) and body
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [ $exit_code -ne 0 ]; then
            echo "❌ curl failed with exit code $exit_code"
            echo "Output:"
            echo "$response"
            exit 1
          fi

          if [ "$http_code" -eq 200 ]; then
            echo "✅ API is healthy (HTTP $http_code)"
          else
            echo "⚠️ API returned HTTP $http_code"
            echo "Response Body:"
            echo "$body"
            exit 1
          fi
      
      - name: 📊 Log timestamp
        if: always()
        run: echo "Pinged at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
