name: Jules Paper Classifier

# Auto-trigger after scraper completes on main branch only
# Restricted to main to prevent deployment spam on PR branches
on:
  workflow_run:
    workflows: ["Library Portal V2 Scraper"]
    branches: [main]
    types: [completed]

  # Manual trigger for ad-hoc classification
  workflow_dispatch:

jobs:
  classify-papers:
    name: Auto-Classify Pending Papers
    runs-on: ubuntu-latest
    # Only run if: manual trigger OR (scraper succeeded on main)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for pending papers
        id: check_pending
        run: |
          if [ -f "staging/pending_review.json" ]; then
            count=$(python3 -c "
          import json
          try:
              with open('staging/pending_review.json') as f:
                  data = json.load(f)
              papers = data.get('papers', [])
              pending = [p for p in papers if not p.get('reviewed', False)]
              print(len(pending))
          except (FileNotFoundError, json.JSONDecodeError, KeyError) as e:
              print(0)
          ")
            echo "pending_count=$count" >> $GITHUB_OUTPUT
            if [ "$count" -gt 0 ]; then
              echo "has_pending=true" >> $GITHUB_OUTPUT
              echo "📋 Found $count papers pending classification"
            else
              echo "has_pending=false" >> $GITHUB_OUTPUT
              echo "✅ No papers pending classification"
            fi
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "pending_count=0" >> $GITHUB_OUTPUT
            echo "✅ No staging file found"
          fi
      
      - name: Invoke Jules Paper Classifier
        if: steps.check_pending.outputs.has_pending == 'true'
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          prompt: |
            Classify pending papers from staging into the correct data files.

            ## Task

            Read `staging/pending_review.json` and categorize each paper with `reviewed: false`
            into the correct target JSON file in `data/classified/organized/`.

            ## Data Structure

            ```
            data/classified/organized/
            ├── btech/
            │   ├── branches/           # Branch-specific papers
            │   │   ├── CSE.json        # Computer Science
            │   │   ├── ECE.json        # Electronics & Communication
            │   │   ├── EEE.json        # Electrical & Electronics
            │   │   ├── Mechanical.json
            │   │   ├── Civil.json
            │   │   └── ... (more branches)
            │   ├── first_year/
            │   │   ├── cs_stream.json      # 2024+ CS stream (CSS prefix, XX02 codes)
            │   │   └── non_cs_stream.json  # 2024+ Core stream (XX71, XX72 codes)
            │   └── common_electives.json
            ├── masters/
            │   ├── mtech.json          # M.Tech (VLS, VL prefixes)
            │   ├── mca.json            # MCA (MCA, MCI prefixes)
            │   └── me.json             # M.E.
            ├── bsc/
            │   └── icas.json           # B.Sc ICAS
            └── other.json              # Uncategorized
            ```

            ## Classification Rules

            1. **Course Code Prefix Mapping:**
               - CSE, DSE, ICT → CSE.json
               - ECE → ECE.json
               - EEE, ELE → EEE.json
               - MEC, MME → Mechanical.json
               - VLS, VL → masters/mtech.json
               - MCA, MCI → masters/mca.json
               - CSS prefix → first_year/cs_stream.json (2024+)

            2. **First Year Detection (2024+):**
               - CSS prefix → CS stream
               - Codes ending in 71, 72 → Non-CS/Core stream
               - Codes ending in 02 → CS stream

            3. **Masters Detection:**
               - Course codes 5XXX pattern
               - VLS/VL prefix → M.Tech VLSI

            ## Paper Schema (required fields)

            ```json
            {
              "file_name": "string",
              "url": "string",
              "year": int,
              "semester": int,
              "course_code": "string",
              "course_name": "string",
              "program": "string",
              "program_abbrev": "string",  // Derive from course code prefix
              "degree_type": "string",
              "scraped_at": "ISO timestamp"
            }
            ```

            ## Process

            1. Read `staging/pending_review.json`
            2. For each paper with `reviewed: false`:
               - Analyze course_code and program fields
               - Determine target file using rules above
               - Add to correct JSON file (append to course_code key)
               - Derive `program_abbrev` from course code prefix
            3. Update staging file: set `reviewed: true`, add `final_target` path
            4. Validate: `python scripts/processing/validate_data.py`
            5. Format: `black .`

            ## Rules and Constraints

            - **Mandatory Documentation Update:** If this run creates a PR, update relevant documentation (e.g., .github/copilot-instructions.md or README) to describe the change and include Copilot agent tips from https://gh.io/copilot-coding-agent-tips.
            - Ensure no duplicate URLs in target files
            - Preserve existing data in target files
            - Use 2-space JSON indentation
            - Only classify papers with `reviewed: false`
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: 'main'
          include_last_commit: true
      
      - name: Summary
        run: |
          echo "## 🏷️ Paper Classifier Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Pending papers**: ${{ steps.check_pending.outputs.pending_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Jules invoked**: ${{ steps.check_pending.outputs.has_pending }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_pending.outputs.has_pending }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Jules has been invoked to classify the pending papers." >> $GITHUB_STEP_SUMMARY
            echo "A PR will be created if classification is successful." >> $GITHUB_STEP_SUMMARY
          fi
