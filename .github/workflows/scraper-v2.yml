name: Library Portal V2 Scraper

on:
  # Weekly schedule - Sunday 2 AM UTC
  schedule:
    - cron: '0 2 * * 0'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes)'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'

jobs:
  scrape-and-process:
    name: Scrape and Categorize Papers
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔍 Pre-scrape validation
        run: |
          echo "📊 Current data status:"
          python -c "
          import json
          from pathlib import Path
          data_dir = Path('data/classified/organized')
          papers = 0
          files = 0
          for f in data_dir.rglob('*.json'):
            files += 1
            with open(f) as fp:
              data = json.load(fp)
              for course in data.values():
                papers += len(course)
          print(f'  Files: {files}')
          print(f'  Papers: {papers}')
          "
      
      - name: 🕷️ Run Scraper (2024+ only)
        run: |
          cd scraper
          echo "🎯 Target year threshold: 2024+"
          echo "🚫 Blacklisted years: 2006-2023"
          scrapy crawl question_papers_enhanced -O scraped_output.json 2>&1 | tail -50
        continue-on-error: true
      
      - name: 📊 Check scraper output
        id: check_output
        run: |
          if [ -f "scraper/scraped_output.json" ]; then
            count=$(python -c "import json; print(len(json.load(open('scraper/scraped_output.json'))))")
            echo "Scraped $count new papers"
            echo "new_papers=$count" >> $GITHUB_OUTPUT
            if [ "$count" -gt 0 ]; then
              echo "has_new=true" >> $GITHUB_OUTPUT
            else
              echo "has_new=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No scraped output file found"
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "new_papers=0" >> $GITHUB_OUTPUT
          fi

      - name: 🧾 Write scraper summary
        run: |
          python - << 'PY'
          import json
          from datetime import datetime
          from pathlib import Path

          has_new = "${{ steps.check_output.outputs.has_new }}" == "true"
          new_papers = int("${{ steps.check_output.outputs.new_papers }}" or 0)

          summary = {
              "has_new": has_new,
              "new_papers": new_papers,
              "generated_at": datetime.utcnow().isoformat() + "Z",
          }

          Path("scraper_summary.json").write_text(
              json.dumps(summary, indent=2), encoding="utf-8"
          )
          PY

      - name: 📤 Upload scraper summary
        uses: actions/upload-artifact@v4
        with:
          name: scraper-summary
          path: scraper_summary.json
          retention-days: 7
      
      - name: 🏷️ Categorize New Papers
        if: steps.check_output.outputs.has_new == 'true'
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🔄 DRY RUN MODE"
            python scripts/processing/run_categorizer.py scraper/scraped_output.json --dry-run
          else
            python scripts/processing/run_categorizer.py scraper/scraped_output.json
          fi
      
      - name: ✅ Validate Data Integrity
        run: python scripts/processing/validate_data.py
      
      - name: 📝 Commit Changes
        if: steps.check_output.outputs.has_new == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add data/classified/organized/
          git add scraper/scrape_log.json
          git add staging/pending_review.json
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            CURRENT_DATE=$(date +%Y-%m-%d)
            NEW_PAPERS=${{ steps.check_output.outputs.new_papers }}
            git commit -m "📚 Auto-update: Added $NEW_PAPERS papers ($CURRENT_DATE)"
            git push
          fi
      
      - name: ⚠️ Check Staging Queue
        run: |
          if [ -f "staging/pending_review.json" ]; then
            count=$(python -c "import json; papers = json.load(open('staging/pending_review.json')).get('papers', []); print(len([p for p in papers if not p.get('reviewed', False)]))")
            if [ "$count" -gt 0 ]; then
              echo "::warning::$count papers need manual review in staging/pending_review.json"
            else
              echo "✅ No papers pending manual review"
            fi
          else
            echo "✅ No staging file (no pending reviews)"
          fi
      
      - name: 📊 Summary
        run: |
          echo "## 📚 Scraper Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "- **New papers found**: ${{ steps.check_output.outputs.new_papers }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: ${{ github.event.inputs.dry_run == 'true' && 'Dry Run' || 'Live' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Final data count - use heredoc to avoid bash quote parsing issues
          python << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json
          from pathlib import Path

          data_dir = Path('data/classified/organized')
          stats = {'total': 0, 'btech': 0, 'masters': 0, 'bsc': 0, 'other': 0}

          for f in data_dir.rglob('*.json'):
            try:
                with open(f) as fp:
                    data = json.load(fp)
                    count = 0
                    for course in data.values():
                        count += len(course)

                    stats['total'] += count

                    if 'btech' in str(f):
                        stats['btech'] += count
                    elif 'masters' in str(f):
                        stats['masters'] += count
                    elif 'bsc' in str(f):
                        stats['bsc'] += count
                    else:
                        stats['other'] += count
            except Exception:
                pass

          print('### 📊 Data Stats')
          print(f"- **Total Papers**: {stats['total']}")
          print(f"- **B.Tech**: {stats['btech']}")
          print(f"- **Masters**: {stats['masters']}")
          print(f"- **B.Sc/ICAS**: {stats['bsc']}")
          print(f"- **Other**: {stats['other']}")
          PYEOF
