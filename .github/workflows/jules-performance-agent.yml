name: Jules API Performance Agent

# Run performance analysis periodically
on:
  schedule:
    # Run every Wednesday at 4 AM UTC
    - cron: '0 4 * * 3'
  workflow_dispatch:

jobs:
  pre-check:
    name: Check for existing performance PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check for open Turbo/performance PRs
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_prs=$(gh pr list --repo ${{ github.repository }} \
            --state open --author '@me' --json title \
            --jq '[.[] | select(.title | test("(?i)turbo|performance|optimiz"))] | length')
          if [ "$open_prs" -gt "0" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Skipping — $open_prs open performance PR(s) already exist"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  optimize:
    name: Performance Optimization
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Invoke Jules Performance Agent
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          prompt: |
            You are TURBO, a performance optimization agent.

            ## IMPORTANT — Check Before Acting

            Read the "Codebase Evolution" section in `.github/copilot-instructions.md`.
            Many areas have already been optimized. Do NOT re-optimize areas documented
            there. Already completed optimizations include:
            - DataLoader URL deduplication (seen_urls set)
            - Search filter set-intersection sorting and early exit
            - Health route threadpool offloading
            - Search token pre-computation
            - Search early-exit on high-quality matches
            - Flyweight pattern for search metadata deduplication
            - lru_cache for global search results

            Only proceed if you find a NEW, unoptimized bottleneck.

            ## Codebase Architecture

            ```
            library-portal-api/
            ├── app_v2/
            │   ├── main.py             # FastAPI app, lifespan loads ~3000+ papers at startup
            │   ├── data_loader.py      # Loads JSON files from data/classified/organized/
            │   ├── services/
            │   │   ├── indexing.py     # PaperIndex class - pre-builds Dict indexes for O(1) lookups
            │   │   └── search.py       # Fuzzy search using TheFuzz library
            │   └── routes/
            │       ├── papers.py       # GET /api/papers with filtering & pagination
            │       └── metadata.py     # GET /api/metadata, /api/statistics
            └── scraper/                # Scrapy spider (not performance critical)
            ```

            ## Runtime Constraints
            - Render free tier: 512MB RAM limit
            - ~3000+ papers loaded in memory at startup
            - In-memory indexing (no database)

            ## Optimization Process

            1. 🔍 PROFILE — Measure current performance with a concrete benchmark:
               `python scripts/benchmarks/benchmark_search.py` or
               `python scripts/benchmarks/benchmark_memory.py`
            2. ⚡ SELECT — Pick a bottleneck that is measurably slow (>10ms or >1MB)
            3. 🔧 OPTIMIZE — Implement with before/after measurements
            4. ✅ VERIFY — Run benchmarks again, confirm measurable improvement
            5. 🎁 PRESENT — Create PR with concrete numbers (not estimates)

            If benchmarks don't show a clear win, do NOT create a PR.

            ## Rules

            - Only optimize if benchmarks show measurable impact
            - Keep changes under 100 lines
            - Don't sacrifice readability for micro-gains
            - Run `black .` and `pytest -q` before PR
            - DO NOT modify .github/copilot-instructions.md or README.md
              unless you changed behavior, config, or public interfaces
            - If no clear win exists, don't create a PR
          jules_api_key: ${{ secrets.JULES_API_KEY }}
