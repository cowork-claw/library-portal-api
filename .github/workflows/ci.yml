name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Ruff lint
        run: |
          ruff check .

      - name: Vulture dead code scan
        run: |
          vulture app_v2 config scraper scripts --min-confidence 70 --exclude "tests,data,course_images,staging"

      - name: Deptry dependency scan
        run: |
          deptry --config deptry.toml .

      - name: Duplicate code scan (non-blocking)
        continue-on-error: true
        run: |
          npx -y jscpd@3.5.10 --config .jscpd.json --path app_v2 scraper scripts

      - name: Check formatting
        run: |
          black --check .
