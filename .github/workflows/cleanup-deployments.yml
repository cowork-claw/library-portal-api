name: Cleanup PR Deployments

on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      ref:
        description: "Branch ref to clean (e.g., dependabot/pip/foo)"
        required: false
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: read
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ -n "${{ github.event.inputs.ref }}" ]; then
            echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "ref=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"

      - name: Delete deployments for ref
        if: steps.ref.outputs.ref != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          python - << 'PY'
          import json
          import os
          import subprocess
          from collections import defaultdict

          repo = os.environ["REPO"]
          ref = os.environ["REF"]

          raw = subprocess.check_output(
              ["gh", "api", "-H", "Accept: application/vnd.github+json", f"/repos/{repo}/deployments?ref={ref}&per_page=100"]
          )
          deployments = json.loads(raw)
          if not deployments:
              print(f"No deployments found for ref: {ref}")
              raise SystemExit(0)

          by_env = defaultdict(list)
          for d in deployments:
              by_env[d.get("environment")].append(d)

          for env, deps in by_env.items():
              deps.sort(key=lambda d: d["created_at"], reverse=True)
              newest = deps[0]
              older = deps[1:]

              for d in older:
                  dep_id = d["id"]
                  subprocess.run(
                      [
                          "gh",
                          "api",
                          "-X",
                          "POST",
                          "-H",
                          "Accept: application/vnd.github+json",
                          f"/repos/{repo}/deployments/{dep_id}/statuses",
                          "-f",
                          "state=inactive",
                          "-f",
                          "description=Cleanup inactive deployment",
                      ],
                      check=True,
                  )
                  subprocess.run(
                      [
                          "gh",
                          "api",
                          "-X",
                          "DELETE",
                          "-H",
                          "Accept: application/vnd.github+json",
                          f"/repos/{repo}/deployments/{dep_id}",
                      ],
                      check=True,
                  )
                  print(f"Deleted inactive deployment {dep_id} ({env})")

              dep_id = newest["id"]
              subprocess.run(
                  [
                      "gh",
                      "api",
                      "-X",
                      "DELETE",
                      "-H",
                      "Accept: application/vnd.github+json",
                      f"/repos/{repo}/deployments/{dep_id}",
                  ],
                  check=True,
              )
              print(f"Deleted newest deployment {dep_id} ({env})")
          PY
