name: Jules Weekly Cleanup

# Run weekly maintenance on the codebase
on:
  schedule:
    # Run every Monday at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  pre-check:
    name: Check for existing Jules PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check for open Jules cleanup PRs
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_prs=$(gh pr list --repo ${{ github.repository }} \
            --state open --author '@me' --json title \
            --jq '[.[] | select(.title | test("(?i)cleanup|code.quality|dead.code|type.hint|docstring"))] | length')
          if [ "$open_prs" -gt "0" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Skipping — $open_prs open cleanup PR(s) already exist"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "✅ No open cleanup PRs found, proceeding"
          fi

  cleanup:
    name: Weekly Codebase Cleanup
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Invoke Jules for Cleanup
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          prompt: |
            You are a code maintenance agent. Analyze this codebase and perform cleanup.

            ## Codebase Structure

            ```
            library-portal-api/
            ├── app_v2/                    # FastAPI application (Python 3.11+)
            │   ├── main.py               # Entry point, lifespan manager, CORS
            │   ├── models.py             # Pydantic models (Paper, CurriculumContext, responses)
            │   ├── data_loader.py        # JSON data loading
            │   ├── routes/               # API endpoints (papers.py, metadata.py, health.py, metrics.py)
            │   ├── services/             # Business logic (indexing.py)
            │   └── middleware/auth.py    # API key authentication
            ├── scraper/                   # Scrapy web scraper
            │   ├── library_scraper/      # Spider, middlewares, settings
            │   └── ../config/config_v2.py # Year thresholds (TARGET_YEAR_THRESHOLD=2024)
            ├── scripts/processing/        # Data processing
            │   ├── paper_categorizer.py  # Categorization logic with confidence scoring
            │   ├── validate_data.py      # Data integrity validation
            │   └── run_categorizer.py    # Categorizer CLI
            ├── config/config_v2.py       # Pydantic settings (LIBRARY_PORTAL_ prefix)
            └── data/classified/organized/ # JSON paper data
            ```

            ## IMPORTANT — Check Before Acting

            Before making any changes, read the "Codebase Evolution" section in
            `.github/copilot-instructions.md`. Do NOT repeat work already documented
            there. If all areas have been recently cleaned, do NOT create a PR.

            ## Focus Areas

            Only address issues that are **clearly wrong or harmful**, not cosmetic:

            1. **Dead Code Removal** — Unused imports, unreachable code paths, or
               functions with zero callers (verify with grep before removing)
            2. **Bug-Adjacent Quality** — Missing type hints ONLY on public API
               endpoints or functions that handle user input. Do NOT add type hints
               to internal helpers just for completeness.
            3. **DRY Violations** — Only refactor if duplicated code has diverged
               or is likely to cause maintenance bugs.

            Do NOT touch:
            - Docstrings (unless factually wrong)
            - Cosmetic formatting or style
            - Type hints on internal/private functions
            - Code that works correctly and is readable

            ## Commands to Run

            - Format code: `black .`
            - Validate data: `python scripts/processing/validate_data.py`
            - Run tests: `pytest -q`

            ## Rules

            - Make incremental, safe refactorings
            - Keep changes under 100 lines
            - DO NOT modify JSON data files in data/
            - DO NOT change API response formats
            - DO NOT update dependencies in requirements.txt
            - DO NOT modify .github/copilot-instructions.md or README.md
              unless you changed behavior, config, or public interfaces
            - Run tests to verify changes
            - Only create a PR if you found high-confidence fixes. If in doubt, skip.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          include_commit_log: true
