name: Jules Weekly Cleanup

# Run weekly maintenance on the codebase
on:
  schedule:
    # Run every Monday at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  cleanup:
    name: Weekly Codebase Cleanup
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Invoke Jules for Cleanup
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          prompt: |
            You are a code maintenance agent. Analyze this codebase and perform cleanup.

            ## Codebase Structure

            ```
            library-portal-api/
            ├── app_v2/                    # FastAPI application (Python 3.11+)
            │   ├── main.py               # Entry point, lifespan manager, CORS
            │   ├── models.py             # Pydantic models (Paper, CurriculumContext, responses)
            │   ├── data_loader.py        # JSON data loading
            │   ├── routes/               # API endpoints (papers.py, metadata.py, health.py)
            │   ├── services/             # Business logic (indexing.py, search.py)
            │   └── middleware/auth.py    # API key authentication
            ├── scraper/                   # Scrapy web scraper
            │   ├── library_scraper/      # Spider, middlewares, settings
            │   └── scraper_config.py     # Year thresholds (TARGET_YEAR_THRESHOLD=2024)
            ├── scripts/processing/        # Data processing
            │   ├── paper_categorizer.py  # Categorization logic with confidence scoring
            │   ├── validate_data.py      # Data integrity validation
            │   └── run_categorizer.py    # Categorizer CLI
            ├── config/config_v2.py       # Pydantic settings (LIBRARY_PORTAL_ prefix)
            └── data/classified/organized/ # JSON paper data
                ├── btech/branches/       # B.Tech papers by branch (CSE.json, ECE.json, etc.)
                ├── btech/first_year/     # First year (cs_stream.json, non_cs_stream.json)
                ├── masters/              # mtech.json, mca.json, me.json
                └── bsc/                  # icas.json
            ```

            ## Focus Areas

            1. **Dead Code Removal**
               - Unused imports and variables
               - Commented-out code blocks
               - Unreachable code paths

            2. **Code Quality**
               - Missing type hints on functions
               - Missing/outdated docstrings (use Google style)
               - Inconsistent naming patterns

            3. **DRY Violations**
               - Duplicated code blocks
               - Similar functions that could be unified

            ## Commands to Run

            - Format code: `black .`
            - Validate data: `python scripts/processing/validate_data.py`
            - Test API starts: `timeout 5 uvicorn app_v2.main:app --host 0.0.0.0 --port 8000 || true`

            ## Rules

            - **Mandatory Documentation Update:** If this run creates a PR, update relevant documentation (e.g., .github/copilot-instructions.md or README) to capture the cleanup changes and include Copilot agent tips from https://gh.io/copilot-coding-agent-tips.
            - Make incremental, safe refactorings
            - Keep changes under 100 lines
            - DO NOT modify JSON data files in data/
            - DO NOT change API response formats
            - DO NOT update dependencies in requirements.txt
            - Run tests to verify changes
            - Only create PR if meaningful improvements found
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          include_commit_log: true
