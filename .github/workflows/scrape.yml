name: Scrape Question Papers

on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '0 2 * * 0' # Runs every Sunday at 2 AM UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          cd library-scraper
          scrapy crawl question_papers_enhanced -o ../question_papers_new.json -L INFO

      - name: Check if scraper found new data
        run: |
          if [ -f "question_papers_new.json" ]; then
            NEW_COUNT=$(python -c "import json; print(len(json.load(open('question_papers_new.json'))))" 2>/dev/null || echo "0")
            echo "Scraper found $NEW_COUNT papers"
            if [ "$NEW_COUNT" -eq "0" ]; then
              echo "No new papers found, skipping processing"
              exit 0
            fi
          else
            echo "No scraper output file found"
            exit 1
          fi

      - name: Process data with master data processor
        run: |
          if [ -f "question_papers_new.json" ]; then
            python master_data_processor.py
          fi

      - name: Upload to Render
        run: |
          if [ -f "question_papers.json" ]; then
            curl -X POST "${{ secrets.RENDER_API_URL }}/api/upload" \
              -H "X-Upload-Key: ${{ secrets.UPLOAD_SECRET_KEY }}" \
              -F "file=@question_papers.json" \
              --max-time 300 \
              --retry 3
          else
            echo "No processed data file found for upload"
          fi
        
      - name: Commit and push if changed
        run: |
          git config --global user.name 'Automated Scraper'
          git config --global user.email 'actions@github.com'
          git add question_papers.json
          git diff --quiet --staged || (git commit -m "Update question papers data $(date '+%Y-%m-%d %H:%M:%S')" && git push)
